<!DOCTYPE html>
<html lang="en-US">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact Rapid Adventures Rafting for reservations, questions, and rafting adventure information.">

    <meta name="author" content="Scarlett Perez Silva">

    <title>Contact Us | Rapid Adventures Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>

        <img src="images/logo.png" alt="Rafting Logo">

        <nav>
            <a href="index.html">Home</a>

            <a href="about.html">About Us</a>

            <a href="trips.html">Trips</a>

            <a href="contact.html">Contact Us</a>
        </nav>

    </header>

    <main>

        <h1>Contact Us</h1>

        <section class="contact-info">

            <h2>Company Information</h2>

            <p><strong>Address:</strong> 123 River Road, Adventure Valley</p>

            <p><strong>Phone:</strong> (555) 123-4567</p>

            <p><strong>Email:</strong> info@rapidadventures.com</p>

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3167273.330470859!2d-110.80574929999999!3d39.17380314999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8747e221a950e831%3A0xf16ff7e6a840605f!2sRed%20River%20Adventures!5e0!3m2!1sen!2sgt!4v1780782641599!5m2!1sen!2sgt"
              allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
              title="Rapid Adventures Location">
            </iframe>

        </section>

        <section class="employees">

            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="General Manager">
                <figcaption>John Smith - General Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Lead River Guide">
                <figcaption>Sarah Johnson - Lead River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Safety Coordinator">
                <figcaption>Michael Davis - Safety Coordinator</figcaption>
            </figure>

        </section>

        <section class="contact-form">

            <h2>Send Us a Message</h2>

            <form>

                <label for="fullname">Name</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <fieldset>

                    <legend>Purpose of Message</legend>

                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label for="website">
                        <input type="radio" id="website" name="purpose" value="website">
                        Website Suggestion
                    </label>

                </fieldset>

                <label for="message">Message</label>

                <textarea id="message" name="message" rows="6" required></textarea>

                <label class="newsletter" for="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Rapid Adventures Rafting | Scarlett Perez Silva🌊
        </p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter">
            </a>

        </nav>

    </footer>

</body>

</html>
